      amount: "500 JOD"
    - place: "1st"
      label: "Grand Prize"
      amount: "1000 JOD"
      featured: true
    - place: "3rd"
      label: "Third Place"
      amount: "250 JOD"

faq:
  tag: "FAQ"
  title: "Frequently Asked Questions"
  items:
    - question: "Who can participate?"
      answer: "University students and fresh graduates residing in Jordan. \nYou don't need to be a CS student."
    - question: "Do I need a team?"
      answer: "Not necessarily, you can solo this or work with a team of up to 4 members."
    - question: "What should I build?"
      answer: "Anything that helps people own their data, use open protocols, or move away from centralized platforms. Check the tracks for inspiration."
    - question: "How will projects be judged?"
      answer: "By a panel of open source maintainers and community leaders based on judging criteria that will be announced in the opening ceremony."

