about:
  tag: "What is this about?"
  title: "A Hackathon for the Open Web"
  description: "The web is increasingly controlled by a handful of corporations. We're building the alternative."
  pillars:
    - title: "Escape Vendor Lock-In"
      description: "How can users leave a platform without losing their data, content, contacts, or workflows?"
    - title: "Bridge Closed and Open Worlds"
      description: "How can people interact with open ecosystems without forcing everyone else to migrate first?"
    - title: "Make Open Alternatives Easier"
      description: "Many open-source alternatives already exist. Why aren't people using them? Build tools that remove friction."
    - title: "Remove Digital Friction"
      description: "Automate annoying, repetitive, bloated, or unnecessarily complex workflows."
  challenge:
    title: "Challenges to Conquer"
    paragraphs:
      - "Your data, your social connections, your creative work, all locked inside platforms that can change the rules whenever they want. We believe it doesn’t have to be this way."
      - "Build tools that give people real choices: to migrate, to self-host, to own what's theirs."

tracks:
  tag: "Challenge Tracks"
  title: "Choose Your Track"
  description: "Pick a track that matches your interests. Each one addresses a different facet of the open web."
  items:
    - num: "1"
      title: "UX & Accessibility / Grandma-Friendly"
      description: "Open source alternatives to simple tools, designed for real people; email, messaging, and photo sharing. Using the tools shouldn’t require knowing 5 programming languages."
      examplesTitle: "Example Focus Areas"
      examples:
        - "Onboarding & Setup Simplification"
        - "Focus on Accessibility & Usability"
        - "Mobile-First Design"
        - "Beginner-Friendly Interfaces"
    - num: "2"
      title: "Open Infrastructure Tooling"
      description: "From deployment to server management. Make running your own infrastructure as easy as logging in a social media app."
      examplesTitle: "Example Focus Areas"
      examples:
        - "Auth and OAuth Systems"
        - "Self-Hosting & Deployment Tools"
        - "Federated Services & Tools"
    - num: "3"
      title: "Communication Freedom / Interoperability & Bridges"
      description: "Keep using popular messaging apps and social media platforms without the downsides of invasive big tech practices or asking contacts to migrate."
      examplesTitle: "Example Focus Areas"
      examples:
        - "Connecting closed and open ecosystems."
        - "Bridging protocols and platforms."
    - num: "4"
      title: "Local-First & Data Ownership"
      description: "Make switching services painless with tools that help people escape centralized platforms, create tools to help export and migrate one’s data as they like."
      examplesTitle: "Example Focus Areas"
      examples:
        - "Tools for file ownership, syncing, backup, portability, and migration."
        - "Offline-First & Local-First Architectures"
        - "Peer-to-Peer Data Sharing"

howItWorks:
  tag: "How It Works"
  title: "Three Steps to Shipping"
  steps:
    - num: "1"
      title: "Register"
      description: "Sign up solo or with a team of up to 4. All skill levels welcome."
    - num: "2"
      title: "Build"
      description: "Once accepted, choose a track, pick a problem, and hack away. Mentors and resources will be available throughout."
    - num: "3"
      title: "Submit"
      description: "Present your project to judges and the community. The goal is to ship something real."

resources:
  tag: "Inspiration"
  title: "Projects to Explore"
  description: "Get inspired by these open source projects that embody the spirit of this hackathon. Get ideas, learn from their approaches, or even build on top of them."
  items:
    - name: "nchat"
      link: "https://github.com/d99kris/nchat"
      description: "Terminal-based messaging client for Linux and macOS with Telegram, WhatsApp and Signal support."
    - name: "RSS-Bridge"
      link: "https://github.com/RSS-Bridge/rss-bridge"
      description: "A project that allows you to generate RSS feeds for websites that don't have one."
    - name: "YunoHost"
      link: "https://github.com/YunoHost"
      description: "An operating system aiming to simplify as much as possible the administration of a server."
    - name: "Pixelfed"
      link: "https://github.com/pixelfed"
      description: "ActivityPub-driven decentralised photo sharing platform."
    - name: "matterbridge"
      link: "https://github.com/42wim/matterbridge"
      description: "A simple bridge between various chat services, allowing users to connect different messaging platforms."
    - name: "Syncthing"
      link: "https://github.com/syncthing/syncthing"
      description: "A peer-to-peer file sync tool that allows users to sync files between devices without relying on a central server."

