criteria:
  # tag: "Judging"
  title: "Projects Eligibility Criteria"
  description: "For your project to be eligible to join the hackathon, it must meet the following criteria:"  
  items:
    - title: "Open Source"
      description: "Projects must be released under an OSI-approved open source license."
      examplesTitle: "Example Licenses"
      examples:
        - "MIT"
        - "GPLv3"
        - "Apache 2.0"
    - title: "Real Problem, Real Users"
      description: "Projects should solve a genuine problem faced by users, communities, developers, or organizations.\nApplications should clearly explain: the problem, who's facing it, why existing solutions are insufficient."
    - title: "Practicality"
      description: "Projects should be compatible with existing workflows such as developing tools that sync seamlessly with existing big tech flows or bridging tools that allow cross use or total migration between open source and proprietary software."
    - title: "Realistic Scope"
      description: "Projects should focus on a specific problem rather than attempting to recreate an entire platform or company.\nProjects should be realistically maintainable after the event."
    - title: "User Ownership & Privacy"
      description: "Projects should respect users by prioritizing data portability, transparency, user control and privacy by design."
    - title: "Extensibility"
      description: "If applicable, projects should expose interfaces that allow future integration and extension."
      examplesTitle: "Example Interfaces"
      examples:
        - "APIs"
        - "Webhooks"
        - "Plugin Systems"
        - "CLI Interfaces"
        - "Import/Export Formats"
    - title: "AI Usage"
      description: "AI-assisted development is allowed. However, projects must be understandable, maintainable, documented, and demonstrably owned by the team.\nYou may vibe and you may code but don’t vibe code as Judges may penalize projects that consist primarily of unmaintainable AI-generated code (aka AI slop)."
  disqualification:
    title: "Disqualifiers"
    description: "Projects that meet any of the following criteria will be disqualified:"
    items:
      - "<strong>Using buzzwords without substance</strong>: Projects that claim to use trendy technologies (like AI, blockchain, etc.) without a clear explanation of how they are used or why they are necessary."
      - "<strong>Vague Problem Statement</strong>: Projects that do not clearly articulate the problem they are solving or the users they are targeting."
      - "<strong>Unrealistic Scope</strong>: Projects that attempt to recreate an entire platform or company, or are not maintainable after the event."
      - "<strong>Privacy Violations</strong>: Projects that do not respect user privacy or data ownership principles."
      - "<strong>AI Slop</strong>: Projects that consist primarily of unmaintainable AI-generated code without clear ownership and documentation by the team."
community:
  tag: "Why This Matters"
  title: "More Than a Competition"
  paragraphs:
    - "This hackathon isn't about building the next startup. It's about building the tools and infrastructure that make tech work better for everyone."
    - "Join a community of builders who believe tech should be open, interoperable, owned by its users and most importantly not controlled by a handful of corporations."

prizes:
  tag: "Prizes"
  title: "The C.r.e.a.m of the Crop"
