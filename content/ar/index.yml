criteria:
  # tag: "التحكيم"
  title: "معايير قبول المشاريع"
  description: "للمشاركة في الهاكاثون، يجب أن يستوفي مشروعك المعايير التالية:"
  items:
    - title: "مفتوح المصدر"
      description: "يجب أن تُطلَق المشاريع بموجب ترخيص مفتوح المصدر معتمد من مبادرة المصدر المفتوح (OSI)."
      examplesTitle: "أمثلة على التراخيص"
      examples:
        - "MIT"
        - "GPLv3"
        - "Apache 2.0"
    - title: "مشكلة حقيقية ومُستخدِمون يعانون منها فعلًا"
      description: "يجب أن تحِل المشاريع مشكلة حقيقية يواجهها المُستخدِمون أو المجتمعات أو المطوِّرون أو المنظمات. عند تقديم الطلب، وضِّح المشكلة ومن يعاني منها وحدِّد أوجه القصور في الحلول الموجودة."
    - title: "قابلية التطبيق"
      description: "يجب أن تتوافق المشاريع مع البرمجيّات القائمة، سواء بالتزامن بسلاسة مع طرق سير العمل الخاصة بالشركات التكنولوجيّة الكبرى أو باستخدام أدوات الجَسْر التي تتيح الاستخدام البيني أو الهجرة الكاملة ما بين البرمجيَّات المفتوحة والمملوكة."
    - title: "نطاق واقعي"
      description: "يجب أن تركِّز المشاريع على مشكلة محددة بدلًا من محاولة إعادة إنشاء منصة أو شركة كاملة.  يجب أن يقبل المشروع التطوير المستمر بعد انتهاء الهاكاثون."
    - title: "سيادة المُستخدِم والخصوصية"
      description: "يجب أن تحترم المشاريع المُستخدِمين بإيلاء الأولوية لقابلية نقل البيانات والشفافية وتحكُّم المُستخدِم والخصوصية منذ مرحلة التصميم."
    - title: "قابلية التوسُّع"
      description: "إن أمكن، يجب أن توفِّر المشاريع واجهات تتيح التكامل والتوسُّع المستقبلي."
      examplesTitle: "أمثلة على الواجهات"
      examples:
        - "واجهات برمجة التطبيقات (APIs)"
        - "خطاف الويب (Webhooks)"
        - "أنظمة الإضافات (Plugin Systems)"
        - "واجهات سطر الأوامر (CLI Interfaces)"
        - "تنسيقات الاستيراد/التصدير (Import/Export Formats)"
    - title: "استخدام الذكاء الاصطناعي"
      description: "يُسمح بالتطوير بمساعدة الذكاء الاصطناعي. شرط أن يبقى المشروع مفهومًا وموثَّقًا وقابلًا للصيانة ومنسوبًا بوضوح إلى أصحابه. استخدم الذكاء الاصطناعي أداةً لا عُكّازًا، إذ قد ينتقص الحُكّام من المشاريع المكوَّنة أساسًا من كود رديء غير قابل للصيانة ولِّد بالذكاء الاصطناعي."
  disqualification:
    title: "دواعي الإقصاء من الهاكاثون"
    description: "ستُستبعَد المشاريع التي تنطبق عليها أي من المعايير التالية:"
    items:
      - "<strong>استخدام مصطلحات رنّانة دون مضمون</strong>: المشاريع التي تدَّعي استخدام تقنيات رائجة (مثل الذكاء الاصطناعي و«البلوك تشين» وغيرها) دون تفسير واضح لطريقة توظيفها أو ضرورتها."
      - "<strong>غموض المشكلة:</strong>: المشاريع التي تفتقر إلى تعريف واضح للمشكلة والجمهور المستَهدَف."
      - "<strong>نطاق غير واقعي</strong>: المشاريع التي تطمح لإعادة بناء منصة كاملة، أو تلك التي لا مستقبل لها بعد الهاكاثون."
      - "<strong>انتهاكات الخصوصية</strong>: المشاريع التي لا تحترم خصوصية المُستخدِم أو مبادئ ملكية البيانات."
      - "<strong>كود رديء مولَّد بالذكاء الاصطناعي (AI Slop)</strong>: المشاريع المكوَّنة أساسًا من كود وُلِّد بالذكاء الاصطناعي غير قابل للصيانة غير موثَّقٍ وليس منسوبًا بوضوح إلى أصحابه."

community:
  tag: "لماذا هذا مهم"
  title: "ليست مجرد مسابقة"
  paragraphs:
    - "هذا الهاكاثون ليس منصة لإطلاق شركات ناشئة. بل هو مسابقة تهدِف إلى بناء أدوات وبنية تحتية تجعل التكنولوجيا تعمل لصالح الجميع."
    - "انضم إلى مجتمع من مطوِّرين يؤمنون بأن التكنولوجيا يجب أن تكون مفتوحة وقابلة للتشغيل البيني ومِلكًا لمستخدميها، والأهم من ذلك ألّا تسيطر عليها حفنة من الشركات."

prizes:
  tag: "الجوائز"
  title: "نخبة النخبة"
  description: "الجائزة الحقيقية هي ما بنيناه معًا، والأثر الذي تركناه في الويب. لكن النقود لا تضر، ولهذا سنكافئ أفضل المشاريع:"
  items:
    - place: "المركز الثاني"
      label: "الوصيف"
      amount: "٥٠٠ دينار"
    - place: "المركز الأول"
      label: "الجائزة الكبرى"
      amount: "١٠٠٠ دينار"
      featured: true
    - place: "المركز الثالث"
      label: "الواعد"
      amount: "٢٥٠ دينار"

faq:
  tag: "الأسئلة الشائعة"
  title: "الأسئلة الشائعة"
  items:
    - question: "من يمكنه المشاركة؟"
      answer: "طُلَّاب الجامعات والمساهمون في المصدر المفتوح والمطوِّرون من جميع المستويات. لست بحاجة إلى شهادة في علوم الحاسوب."
    - question: "هل علي أن أشارك ضمن فريق؟"
      answer: "ليس بالضرورة، يمكنك أن تُشارِك بمفردك أو ضمن فريق من ٤ أعضاء كحد أقصى. وسنقدِّم جلسة لتشكيل الفرق خلال حفل الافتتاح."
    - question: "ماذا أبني؟"
      answer: "أي أداة تساعد الناس على استعادة بياناتهم، أو التحرُّر من قيود البروتوكولات المغلقة، أو الانتقال إلى بدائل مفتوحة. راجع المسارات المُتاحة واستلهم من الأفكار"
    - question: "ما هي معايير تحكيم المشاريع؟"
      answer: "ستُقيِّم لجنة من مشرفي وقادة مجتمع المصدر المفتوح المشاريعَ بناءً على أثرها وجودتها التقنية ومستواها من الانفتاح والإبداع."

