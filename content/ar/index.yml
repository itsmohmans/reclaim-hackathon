about:
  tag: "ما فكرة هذه المسابقة؟"
  title: "هاكاثون من أجل الويب المفتوح"
  description: "في كل لحظة تمر، تُحكِم حفنة من الشركات الكبرى قبضتها على الويب المفتوح، لذا سوف نبني البديل."
  pillars:
    - title: "تحرَّر من الاحتكار التقني"
      description: "كيف يمكن للمُستخدِمين أن يغادِروا منصة ما دون أن يفقدوا بياناتهم أو محتواهم أو جهات اتصالهم أو طريقة سير العمل التي اعتادوها؟"
    - title: "كُن جسرًا بين العالمَين المغلق والمفتوح"
      description: "كيف يمكن للناس أن تتفاعل مع المنظومات المفتوحة دون إجبار الجميع على الهجرة أولًا؟"
    - title: "ضع البدائل المفتوحة في متناول الجميع"
      description: "هنالك العديد من البدائل مفتوحة المصدر. لماذا لا يستخدمها الناس؟ ابنِ أدوات تزيل نقاط التوتر."
    - title: "اكسر قيود التجربة الرقمية"
      description: "حوِّل كل ما هو متكرِّر ومزعج في عملك اليومي إلى عمليات آلية سلسة ومؤتمتة."
  challenge:
    title: "التحدي"
    paragraphs:
      - "بياناتك، علاقاتك الاجتماعية، أعمالك الإبداعية — كلها محبوسة داخل منصات تستطيع تغيير القواعد متى شاءت. نؤمن أن الأمر لا يجب أن يكون هكذا."
      - "ابنِ أدوات تمنح الناس خيارات حقيقية: للانتقال، للاستضافة الذاتية، لامتلاك ما هو لهم."

tracks:
  tag: "مسارات التحدي"
  title: "اختر مسارك"
  description: "اختر المسار الأنسب لك. تتناول المسارات تحديات مختلفة في عالم الويب المفتوح."
  items:
    - num: "١"
      title: "تجربة المستخدم وإمكانية الوصول / لكل المُستخدِمين دون استثناء"
      description: "بدائل مفتوحة المصدر للأدوات اليومية، مصممة للناس العاديين، مثل البريد الإلكتروني، وتطبيقات المراسلة، و تطبيقات مشاركة الصور. لا يجب أن يَستلزِم استخدام الأداة شهادة في علوم الحاسوب."
    - num: "٢"
      title: "أدوات البنية التحتية المفتوحة"
      description: "من مرحلة النشر إلى إدارة الخوادم. شغِّل بنيتك التحتية الخاصة بنفس سهولة تسجيل الدخول إلى بريدك الإلكتروني."
    - num: "٣"
      title: "حرية التواصل / التشغيل البيني والجسور"
      description: "تواصَل عبر تطبيقات المراسلة ومواقع التواصل الاجتماعي الشهيرة دون أن تتنازل عن خصوصيتك أو أن تُرغِم معارِفك على تركها."
    - num: "٤"
      title: "بياناتك على جهازك، وأنت من يملكها"
      description: "سهِّل التبديل بين الخدمات بأدوات تساعد الناس على التخلُّص من قيود المنصات المركزية، وابنِ أدوات لتصدير البيانات وترحيلها حسب الرغبة."

howItWorks:
  tag: "الطريق إلى الهاكاثون"
  title: "ثلاث خطوات لإطلاق المنتج"
  steps:
    - num: "١"
      title: "التسجيل"
      description: "سجِّل بمفردك أو ضمن فريق يتكون من ٤ أعضاء كحد أقصى. نرحِّب بجميع المستويات، خبرتك لا تُحدِّد مكانك هنا."
    - num: "٢"
      title: "البناء"
      description: "عند قبولك، اختر مسارًا، ثم اختر مشكلة، وابدأ بالبرمجة. طوال رحلتك، سيكون المشرفون والموارد في خدمتك."
    - num: "٣"
      title: "التسليم"
      description: "اعرِض مشروعك أمام الحكَّام والمجتمع. أطلق مشروعًا حقيقيًا."

resources:
  tag: "الإلهام"
  title: "مشاريع تستحق الدراسة"
  description: "استلهم الأفكار من هذه المشاريع مفتوحة المصدر التي تجسِّد روح هذا الهاكاثون. تعلَّم من مطوِّريها وأساليبهم أو ابنِ فوق ما أسَّسوه."
  items:
    - name: "nchat"
      link: "https://github.com/d99kris/nchat"
      description: "منصة مراسلة طرفية للينوكس وماك أو أس مع دعم تقني من تيليجرام، واتساب وسيجنال."
    - name: "RSS-Bridge"
      link: "https://github.com/RSS-Bridge/rss-bridge"
      description: "مشروع يتيح للمستخدم إنشاء موجز RSS للمواقع التي لا تملك هذه الموجزات."
    - name: "YunoHost"
      link: "https://github.com/YunoHost"
      description: "نظام تشغيل يسعى لتبسيط مهمة إدارة الخادم قدر الإمكان."
    - name: "Pixelfed"
      link: "https://github.com/pixelfed"
      description: "منصة مشاركة صور لامركزية وقائمة على البروتوكول المفتوح ActivityPub."
    - name: "matterbridge"
      link: "https://github.com/42wim/matterbridge"
      description: "جسر بسيط بين خدمات دردشة متعددة يسمح للمستخدمين بالتواصل في ما بين منصات الدردشة المختلفة."
    - name: "Syncthing"
      link: "https://github.com/syncthing/syncthing"
      description: "أداة مزامنة بين الأقران تتيح للمستخدمين القدرة على مزامنة الملفات بين أجهزة متعددة دون الاعتماد على خادم مركزي."

