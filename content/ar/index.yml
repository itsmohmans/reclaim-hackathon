faq:
  tag: "الأسئلة الشائعة"
  title: "الأسئلة المتكررة"
  items:
    - question: "من يمكنه المشاركة؟"
      answer: "طلاب الجامعات، المساهمون في المصادر المفتوحة، والمطورون من جميع المستويات مرحب بهم. لا تحتاج أن تكون طالب علوم حاسوب."
    - question: "هل أحتاج فريقاً؟"
      answer: "يمكنك المشاركة بمفردك أو في فرق تصل إلى ٤ أفراد. سيكون هناك أيضاً جلسة لتشكيل الفرق عند الانطلاق."
    - question: "هل هذا حدث كريبتو/ويب٣؟"
      answer: "لا. هذا عن البروتوكولات المفتوحة، ملكية البيانات، والأدوات العملية. ليس عن العملات المشفرة أو NFT أو البلوكتشين."
    - question: "ماذا يجب أن أبني؟"
      answer: "أي شيء يساعد الناس على امتلاك بياناتهم، استخدام البروتوكولات المفتوحة، أو الابتعاد عن المنصات المركزية. تفقد المسارات للإلهام."
    - question: "كيف سيتم تحكيم المشاريع؟"
      answer: "من قبل لجنة من مشرفي المصادر المفتوحة وقادة المجتمع بناءً على الأثر، الجودة التقنية، الانفتاح، والإبداع."

