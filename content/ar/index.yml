      description: "سجّل بشكل فردي أو كفريق."
    - date: "١٦ يونيو"
      title: "حفل الافتتاح"
      description: "حدث الانطلاق مع تقديم المسارات وتشكيل الفرق."
    - date: "١٦ يونيو – ١٠ يوليو"
      title: "فترة البرمجة"
      description: "ابنِ مشروعك مع دعم الموجهين وورش العمل."
    - date: "١٠ يوليو"
      title: "موعد التسليم"
      description: "قدّم مشروعك، التوثيق، والعرض التوضيحي."
    - date: "١٤–١٦ يوليو"
      title: "التحكيم"
      description: "مراجعة المشاريع من قبل مشرفي المصادر المفتوحة وقادة المجتمع."
    - date: "١٨ يوليو"
      title: "حفل الختام"
      description: "إعلان الفائزين وعرض المجتمع."

criteria:
  tag: "التحكيم"
  title: "كيف يتم تقييم المشاريع"
  items:
    - title: "الأثر والفائدة"
      description: "هل يحل مشكلة حقيقية لأناس حقيقيين؟"
    - title: "الجودة التقنية"
      description: "هل الكود نظيف، وظيفي، وموثق بشكل جيد؟"
    - title: "الانفتاح"
      description: "هل يستطيع الآخرون المساهمة، والتفريع، والبناء على هذا المشروع؟"
    - title: "الإبداع"
      description: "هل يتعامل مع المشكلة بطريقة جديدة ومثيرة للاهتمام؟"

community:
  tag: "لماذا هذا مهم"
  title: "أكثر من مجرد منافسة"
  paragraphs:
    - "هذا الهاكاثون ليس عن بناء الشركة الناشئة القادمة. إنه عن بناء الأدوات والبنية التحتية التي تجعل الإنترنت يعمل بشكل أفضل للجميع."
    - "انضم إلى مجتمع من البنّائين الذين يؤمنون بأن الويب يجب أن يكون مفتوحاً، قابلاً للتشغيل البيني، ومملوكاً لمستخدميه — وليس خاضعاً لسيطرة حفنة من الشركات."

prizes:
  tag: "الجوائز"
  title: "تقدير، وليس الهدف"
  description: "الجوائز لطيفة، لكن المكافأة الحقيقية هي إطلاق شيء مفيد."
  items:
