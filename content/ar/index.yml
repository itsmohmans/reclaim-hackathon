about:
  tag: "ما الموضوع؟"
  title: "هاكاثون من أجل الويب المفتوح"
  description: "الويب يخضع بشكل متزايد لسيطرة حفنة من الشركات الكبرى. نحن نبني البديل."
  pillars:
    - title: "امتلك بياناتك"
      description: "ابنِ أدوات تتيح للناس تصدير بياناتهم الشخصية والتحكم فيها وامتلاكها فعلاً. لا مزيد من الاحتكار."
    - title: "اربط كل شيء"
      description: "أنشئ جسوراً بين الخدمات والبروتوكولات ليعمل الويب المفتوح معاً بالفعل."
    - title: "ابنِ للجميع"
      description: "اصنع بدائل مفتوحة المصدر يستطيع الناس العاديون — وليس المطورون فقط — استخدامها فعلاً."
  challenge:
    title: "التحدي"
    paragraphs:
      - "بياناتك، علاقاتك الاجتماعية، أعمالك الإبداعية — كلها محبوسة داخل منصات تستطيع تغيير القواعد متى شاءت. نؤمن أن الأمر لا يجب أن يكون هكذا."
      - "ابنِ أدوات تمنح الناس خيارات حقيقية: للانتقال، للاستضافة الذاتية، لامتلاك ما هو لهم."

tracks:
  tag: "مسارات التحدي"
  title: "اختر مسارك"
  description: "اختر المسار الذي يناسب اهتماماتك. كل مسار يعالج جانباً مختلفاً من الويب المفتوح."
  items:
    - num: "٠١"
      title: "بديل سهل للجدة"
      description: "بدائل مفتوحة المصدر للأدوات اليومية، مصممة للناس العاديين. البريد، المراسلة، مشاركة الصور — قابلة للاستخدام بدون شهادة في علوم الحاسوب."
    - num: "٠٢"
      title: "أدوات البنية التحتية المفتوحة"
      description: "الاستضافة الذاتية، النشر، إدارة الخوادم. اجعل تشغيل بنيتك التحتية سهلاً كالضغط على \"تسجيل\"."
    - num: "٠٣"
      title: "أدوات سطر الأوامر"
      description: "أدوات سطر أوامر للنظام البيئي مفتوح المصدر. سكربتات الترحيل، أدوات البروتوكولات، سير عمل المطورين."
    - num: "٠٤"
      title: "ملكية البيانات"
      description: "أدوات تساعد الناس على تصدير بياناتهم وترحيلها من المنصات المركزية. اجعل التبديل بين الخدمات سهلاً."

howItWorks:
  tag: "كيف يعمل"
  title: "ثلاث خطوات للإطلاق"
  steps:
    - num: "١"
      title: "سجّل"
      description: "سجّل بمفردك أو مع فريق يصل إلى ٤ أفراد. جميع المستويات مرحب بها."
    - num: "٢"
      title: "ابنِ"
      description: "اختر مساراً، حدد مشكلة، وابدأ البرمجة. الموجهون والموارد متاحون طوال الفترة."
    - num: "٣"
      title: "قدّم"
      description: "قدّم مشروعك للحكّام والمجتمع. أطلق شيئاً حقيقياً."

resources:
  tag: "النظام البيئي"
  title: "تقنيات للاستكشاف"
  description: "استلهم من هذه البروتوكولات والأدوات المفتوحة. استخدمها كلبنات بناء لمشروعك."
  items:
    - name: "Matrix"
      description: "بروتوكول اتصال لامركزي مشفر من طرف إلى طرف."
    - name: "ActivityPub"
      description: "البروتوكول الذي يشغّل ماستودون والفيديفيرس."
    - name: "ATProto"
      description: "بروتوكول بلوسكاي المفتوح للشبكات الاجتماعية."
    - name: "OpenStreetMap"
      description: "ويكيبيديا الخرائط. بيانات مفتوحة يبنيها المجتمع."
    - name: "PeerTube"
      description: "استضافة فيديو فيدرالية. يوتيوب بدون المنصة."
    - name: "Nextcloud"
      description: "إنتاجية مستضافة ذاتياً. ملفات، تقويم، جهات اتصال — ملكك."

